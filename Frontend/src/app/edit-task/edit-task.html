<h1 class="page-title">

  ✏️ Edit Task

</h1>

<p class="subtitle">

  Update task information.

</p>

<div class="form-card">

  <div class="row">

    <div class="form-group">

      <label>Task Name</label>

      <input type="text"
             [(ngModel)]="taskName">

    </div>

    <div class="form-group">

      <label>Project</label>

      <select [(ngModel)]="projectId">

        <option *ngFor="let p of projects"
                [value]="p.projectId">

          {{p.projectName}}

        </option>

      </select>

    </div>

  </div>

  <div class="row">

    <div class="form-group">

      <label>Employee</label>

      <select [(ngModel)]="userId">

        <option *ngFor="let u of users"
                [value]="u.userId">

          {{u.fullName}}

        </option>

      </select>

    </div>

    <div class="form-group">

      <label>Priority</label>

      <select [(ngModel)]="priority">

        <option>High</option>
        <option>Medium</option>
        <option>Low</option>

      </select>

    </div>

  </div>

  <div class="row">

    <div class="form-group">

      <label>Start Date</label>

      <input type="date"
             [(ngModel)]="startDate">

    </div>

    <div class="form-group">

      <label>Due Date</label>

      <input type="date"
             [(ngModel)]="dueDate">

    </div>

  </div>

  <div class="row">

    <div class="form-group">

      <label>Status</label>

      <select [(ngModel)]="status">

        <option>Not Started</option>
        <option>In Progress</option>
        <option>Completed</option>

      </select>

    </div>

  </div>

  <div class="row">

    <div class="form-group full">

      <label>Description</label>

<textarea rows="5"
          [(ngModel)]="description">

</textarea>

    </div>

  </div>

  <div class="buttons">

    <button class="update-btn"
            (click)="updateTask()">

      💾 Update Task

    </button>

    <button class="cancel-btn"
            routerLink="/tasks">

      Cancel

    </button>

  </div>

</div>
