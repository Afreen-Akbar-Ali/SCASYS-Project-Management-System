<h1 class="page-title">

  ➕ Add Employee

</h1>

<p class="subtitle">

  Register a new employee in SCASYS

</p>

<div class="form-card">

  <div class="row">

    <div class="form-group">

      <label>Full Name</label>

      <input type="text"
             [(ngModel)]="fullName"
             placeholder="Enter Full Name">

    </div>

    <div class="form-group">

      <label>Email</label>

      <input type="email"
             [(ngModel)]="email"
             placeholder="Enter Email">

    </div>

  </div>

  <div class="row">

    <div class="form-group">

      <label>Username</label>

      <input type="text"
             [(ngModel)]="username"
             placeholder="Enter Username">

    </div>

    <div class="form-group">

      <label>Password</label>

      <input type="password"
             [(ngModel)]="password"
             placeholder="Enter Password">

    </div>

  </div>

  <div class="row">

    <div class="form-group">

      <label>Role</label>

      <select [(ngModel)]="role">

        <option value="Employee">Employee</option>

        <option value="Admin">Admin</option>

      </select>

    </div>

    <div class="form-group">

      <label>Status</label>

      <select [(ngModel)]="isActive">

        <option [ngValue]="true">Active</option>

        <option [ngValue]="false">Inactive</option>

      </select>

    </div>

  </div>

  <div class="buttons">

    <button class="save-btn"
            (click)="saveUser()">

      💾 Save Employee

    </button>

    <button class="cancel-btn"
            routerLink="/users">

      Cancel

    </button>

  </div>

</div>
