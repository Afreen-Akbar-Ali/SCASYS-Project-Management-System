<h1 class="page-title">

  📁 Add Project

</h1>

<p class="subtitle">

  Create a new project and assign it to an employee.

</p>

<div class="form-card">

  <div class="row">

    <div class="form-group">

      <label>Project Name</label>

      <input type="text"
             [(ngModel)]="projectName"
             placeholder="Enter Project Name">

    </div>

    <div class="form-group">

      <label>Assign Employee</label>

      <select [(ngModel)]="userId">

        <option [ngValue]="0">

          Select Employee

        </option>

        <option *ngFor="let user of users"
                [ngValue]="user.userId">

          {{user.fullName}}

        </option>

      </select>

    </div>

  </div>

  <div class="row">

    <div class="form-group full-width">

      <label>Description</label>

      <textarea rows="5"
                [(ngModel)]="description"
                placeholder="Enter Project Description">

            </textarea>

    </div>

  </div>

  <div class="row">

    <div class="form-group">

      <label>Start Date</label>

      <input type="date"
             [(ngModel)]="startDate">

    </div>

    <div class="form-group">

      <label>Due Date</label>

      <input type="date"
             [(ngModel)]="dueDate">

    </div>

  </div>

  <div class="row">

    <div class="form-group">

      <label>Priority</label>

      <select [(ngModel)]="priority">

        <option>High</option>
        <option>Medium</option>
        <option>Low</option>

      </select>

    </div>

    <div class="form-group">

      <label>Status</label>

      <select [(ngModel)]="status">

        <option>Not Started</option>
        <option>In Progress</option>
        <option>Completed</option>

      </select>

    </div>

  </div>

  <div class="buttons">

    <button class="save-btn"
            (click)="saveProject()">

      💾 Save Project

    </button>

    <button class="cancel-btn"
            routerLink="/projects">

      Cancel

    </button>

  </div>

</div>
